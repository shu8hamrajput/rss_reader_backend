# fly.toml app configuration file generated for rss-reader-api on 2026-06-03T11:48:39+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rss-reader-api'
primary_region = 'bom'

[build]

[env]
  PORT = '8080'
  # DATABASE_URL, REDIS_URL, CELERY_BROKER_URL, CELERY_RESULT_BACKEND are set as
  # secrets (see .env.example) — point them at managed Postgres/Redis,
  # e.g. `fly postgres create` or Neon, and a single Upstash Redis instance
  # (db0/db1/db2 for cache, Celery result backend, and Celery broker).

[processes]
  app = 'uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 1 --proxy-headers --forwarded-allow-ips="*"'
  worker = 'celery -A app.celery_app worker -B --loglevel=info --concurrency=2'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[mounts]]
  source = 'rss_reader_data'
  destination = '/data'
  processes = ['app']

[[vm]]
  processes = ['app']
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[vm]]
  processes = ['worker']
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
